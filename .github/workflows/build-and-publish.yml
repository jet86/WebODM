name: Build and Publish Docker Image

on:
  push:
    paths-ignore:
    - 'README.md'
    branches:
    - master
    tags:
    - v*

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to DockerHub
      uses: docker/login-action@v1 
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Docker meta
      id: docker_meta
      uses: crazy-max/ghaction-docker-meta@v1
      with:
        images: webodm/webodm_webapp
        tag-semver: |
          {{version}}
    - name: Build and push Docker image (AMD64)
      id: docker_build_amd64
      uses: docker/build-push-action@v6
      with:
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        no-cache: true
        tags: |
          webodm/webodm_webapp:latest-amd64
        provenance: false
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to DockerHub
      uses: docker/login-action@v1 
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Docker meta
      id: docker_meta
      uses: crazy-max/ghaction-docker-meta@v1
      with:
        images: webodm/webodm_webapp
        tag-semver: |
          {{version}}
    - name: Build and push Docker image (ARM64)
      id: docker_build_arm64
      uses: docker/build-push-action@v6
      with:
        file: ./Dockerfile
        platforms: linux/arm64
        push: true
        no-cache: true
        tags: |
          webodm/webodm_webapp:latest-arm64
        provenance: false
  create-manifest:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Create and push multi-platform manifest
      run: |
        docker pull --platform linux/amd64 webodm/webodm_webapp:latest-amd64
        docker pull --platform linux/arm64 webodm/webodm_webapp:latest-arm64
        docker manifest create webodm/webodm_webapp:latest \
          webodm/webodm_webapp:latest-amd64 \
          webodm/webodm_webapp:latest-arm64
        docker manifest push webodm/webodm_webapp:latest
    - name: Create and push multi-platform manifest (version tag)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        
        docker manifest create webodm/webodm_webapp:${VERSION} \
          webodm/webodm_webapp:latest-amd64 \
          webodm/webodm_webapp:latest-arm64
        docker manifest push webodm/webodm_webapp:${VERSION}